name: deploy-app

# Deploys the InstaSearch Cloudflare Worker (app/) from CI, and syncs its
# runtime secret (META_APP_SECRET) FROM GitHub secrets → the Worker. This keeps
# the app secret in GitHub only; it never has to live on anyone's machine.
#
# Manual-trigger only (matches the "controlled deploys" posture). Add a
# `push: { branches: [main], paths: [app/**] }` trigger later if you want
# auto-deploy on merge.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  - token with Workers Scripts:Edit, Workers KV:Edit,
#                           D1:Edit, and Workers Secrets:Edit on this account
#   META_APP_SECRET       - the "CodeSamur.ai Publisher" app secret
#   CLOUDFLARE_ACCOUNT_ID - optional; only needed if the token spans >1 account
#                           (this account id is f91d00926fc61bd972a4fdde51125077)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — required secrets present
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          APPSEC: ${{ secrets.META_APP_SECRET }}
        run: |
          missing=""
          [ -z "$CF" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          [ -z "$APPSEC" ] && missing="$missing META_APP_SECRET"
          if [ -n "$missing" ]; then
            echo "::error::Missing required GitHub secret(s):$missing — add them in repo Settings → Secrets."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Deploy Worker
        run: npx wrangler deploy

      - name: Sync Worker secret from GitHub → Cloudflare
        env:
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
        run: printf '%s' "$META_APP_SECRET" | npx wrangler secret put META_APP_SECRET

      - name: Report URL
        run: echo "::notice::Deployed → https://instasearch.blackbaysolutions.workers.dev"
